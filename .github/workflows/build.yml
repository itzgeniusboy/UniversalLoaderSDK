name: Build OneCore SDK & Loader

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Bootstrap Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading gradle-wrapper.jar..."
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        fi
        chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup NDK
      run: |
        sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
    
    - name: Generate Release Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias onecore -keyalg RSA -keysize 2048 -validity 10000 -storepass onecore123 -keypass onecore123 -dname "CN=OneCore SDK, O=OneCore, C=US"

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build SDK and Loader
      run: ./gradlew :sdk:assembleRelease :loader:assembleRelease --no-daemon --stacktrace

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: OneCore Release v1.0.${{ github.run_number }}
        files: |
          loader/build/outputs/apk/release/*.apk
          sdk/build/outputs/aar/*.aar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload SDK AAR
      uses: actions/upload-artifact@v4
      with:
        name: OneCore-SDK-AAR
        path: sdk/build/outputs/aar/*.aar

    - name: Upload Loader APK
      uses: actions/upload-artifact@v4
      with:
        name: OneCore-Loader-APK
        path: loader/build/outputs/apk/release/*.apk
