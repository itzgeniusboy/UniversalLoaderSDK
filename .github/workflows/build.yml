name: Build SDK AAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup NDK
      run: |
        sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
    
    - name: Bootstrap Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading gradle-wrapper.jar..."
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        fi
        if [ ! -f gradlew ]; then
          echo "Bootstrapping gradlew..."
          gradle wrapper --gradle-version 8.7
        fi
        chmod +x gradlew || true
    
    - name: Build AAR
      run: ./gradlew :app:assembleRelease --no-daemon
    
    - name: Upload AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UniversalLoaderSDK-AAR
        path: app/build/outputs/aar/*.aar
        if-no-files-found: error
