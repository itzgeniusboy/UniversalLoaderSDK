<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OneCore SDK Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="max-w-md w-full bg-[#0A0A0A] border border-[#1F1F1F] p-8 rounded-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">OneCore SDK Engine</h1>
            <p class="text-gray-500 text-sm italic serif">Admin Control Panel</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Username</label>
                <input type="text" id="username" required class="w-full bg-[#050505] border border-[#1F1F1F] rounded-lg px-4 py-3 text-sm focus:border-[#F27D26] outline-none transition-colors">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-[#050505] border border-[#1F1F1F] rounded-lg px-4 py-3 text-sm focus:border-[#F27D26] outline-none transition-colors">
            </div>
            <div id="error-msg" class="text-red-500 text-xs hidden">Invalid credentials. Please try again.</div>
            <button type="submit" class="w-full bg-[#F27D26] hover:bg-[#F49147] text-black font-bold py-3 rounded-lg text-sm uppercase tracking-tighter transition-all">
                Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Hardcoded credentials for Demo/Admin
            if (u === 'admin' && p === 'admin123') {
                localStorage.setItem('sdk_admin_token', 'logged_in');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('sdk_admin_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
