<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OneCore SDK Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #fff;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(242, 125, 38, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(20, 20, 20, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 20, 20, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); }
        .input-field {
            width: 100%;
            background: #080808;
            border: 1px solid #1F1F1F;
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #F27D26;
            box-shadow: 0 0 0 1px #F27D26;
        }
        .btn-primary {
            width: 100%;
            background: #F27D26;
            color: black;
            font-weight: 700;
            padding: 1.125rem;
            border-radius: 1rem;
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 3rem;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[26rem] w-full glass border border-[#1F1F1F] p-8 lg:p-12 rounded-[2rem] shadow-[0_30px_60px_-12px_rgba(0,0,0,0.5)]">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-[#F27D26] rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-[0_10px_30px_rgba(242,125,38,0.3)]">
                <span class="text-black font-black text-3xl">O</span>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2">OneCore <span class="text-[#F27D26]">SDk</span></h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold">Secure Management Interface</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500 mb-3 ml-1">Identity</label>
                <input type="text" id="username" placeholder="Username" required class="input-field">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500 mb-3 ml-1">Keyphrase</label>
                <input type="password" id="password" placeholder="Password" required class="input-field">
            </div>
            <div id="error-msg" class="bg-red-500/10 border border-red-500/20 text-red-500 text-[11px] px-4 py-3 rounded-xl hidden">
                <span class="font-bold uppercase tracking-tight">Access Prohibited:</span> Invalid operational credentials.
            </div>
            <button type="submit" class="btn-primary">
                Establish Session
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-[#1F1F1F] text-center">
            <p class="text-[10px] text-gray-600 font-medium tracking-wide">ONECORE SECURE MANAGEMENT INTERFACE &copy; 2026</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // SECURITY REQUIREMENT: Updated credentials
            // Username: OneCoreSDK
            // Password: OneCore@1234SDK
            if (u === 'OneCoreSDK' && p === 'OneCore@1234SDK') {
                // Set persistent session token
                localStorage.setItem('sdk_admin_token', 'sha256_' + Date.now());
                window.location.href = 'dashboard.html';
            } else {
                // Visual feedback for error
                errorMsg.classList.remove('hidden');
                document.querySelectorAll('input').forEach(i => {
                    i.classList.add('border-red-900/50');
                    setTimeout(() => i.classList.remove('border-red-900/50'), 2000);
                });
            }
        });

        // Initialize session check
        if (localStorage.getItem('sdk_admin_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
